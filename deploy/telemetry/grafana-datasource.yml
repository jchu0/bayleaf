# Grafana datasource provisioning for the optional docker-compose telemetry demo.
# Points Grafana at the Prometheus service defined in docker-compose.yml.

apiVersion: 1

datasources:
  - name: bayleaf-Prometheus
    type: prometheus
    # Stable uid so the provisioned dashboard (grafana-dashboard.json) binds to it deterministically.
    uid: bayleaf-prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
