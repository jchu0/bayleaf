# Datadog Agent OpenMetrics check for the PipeGuard read-API `/metrics` seam.
#
# Install path: drop this file at `conf.d/openmetrics.d/conf.yaml` under the
# Datadog Agent config dir (or add the `instances:` entry to an existing one),
# then restart the Agent. Uses the OpenMetrics V2 check (`openmetrics_endpoint`).
#
# Pull model: the Datadog Agent scrapes /metrics; PipeGuard makes no outbound
# call and ships no credentials. The exposition carries only aggregate counts and
# closed-enum verdict/gate labels — no sample ids, no PHI
# (see docs/ops/telemetry-connectors.md).
#
# The read-API serves /metrics on port 8010. Point `openmetrics_endpoint` at your
# API host — `host.docker.internal` when the Agent runs in a container on Docker
# Desktop; use the API host:port for a native Agent or a remote deployment.

init_config:

instances:
  - openmetrics_endpoint: http://host.docker.internal:8010/metrics
    namespace: pipeguard
    # Explicit allow-list of the four series the seam exposes. Under OpenMetrics V2
    # a `_total` counter is ingested as `<namespace>.<name>.count` in Datadog
    # (e.g. `pipeguard.cards.count`), preserving the verdict/gate label dimensions.
    metrics:
      - pipeguard_runs_total
      - pipeguard_samples_total
      - pipeguard_cards_total
      - pipeguard_gate_flagged_samples_total
    min_collection_interval: 30
    tags:
      - service:pipeguard
      - component:read-api
