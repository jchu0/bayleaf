# OpenTelemetry Collector config for the bayleaf read-API `/metrics` seam.
#
# Bridges the same pull-based /metrics endpoint to any OTLP-compatible APM
# (New Relic, Honeycomb, Grafana Cloud, ...) without adding an in-app exporter or
# a new bayleaf dependency: the Collector scrapes /metrics (Prometheus receiver)
# and forwards over OTLP. All backend credentials live in the Collector's env, not
# in bayleaf (CLAUDE.md Security 1 — never hardcode keys).
#
# Pull model: the Collector scrapes; bayleaf makes no outbound call. The
# exposition carries only aggregate counts and closed-enum verdict/gate labels —
# no sample ids, no PHI (see docs/ops/telemetry-connectors.md).
#
# Run (example):
#   OTLP_ENDPOINT=<vendor-otlp-ingest> OTLP_API_KEY=<key> \
#     otelcol-contrib --config deploy/telemetry/otel-collector-config.yaml

receivers:
  prometheus:
    config:
      scrape_configs:
        - job_name: bayleaf
          scrape_interval: 30s
          metrics_path: /metrics
          static_configs:
            - targets:
                - "host.docker.internal:8010"   # host API from a containerized Collector; use API host:port otherwise
              labels:
                service: bayleaf
                component: read-api

processors:
  batch:
    timeout: 10s

exporters:
  # Forward to any OTLP backend. Endpoint + auth header come from the environment.
  otlp:
    endpoint: "${env:OTLP_ENDPOINT}"
    headers:
      api-key: "${env:OTLP_API_KEY}"
  # Local sanity check — prints scraped series to the Collector log.
  debug:
    verbosity: normal

service:
  pipelines:
    metrics:
      receivers: [prometheus]
      processors: [batch]
      exporters: [otlp, debug]
