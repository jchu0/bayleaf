# Optional local telemetry stack for the "connect your APM" demo moment.
#
# Stands up Prometheus + Grafana that scrape the locally-running PipeGuard
# read-API (`uv run uvicorn api.main:app --port 8010`) over its /metrics seam.
#
# DEMO SIZZLE ONLY — this is NOT on the offline Streamlit/API demo path and is not
# required to run PipeGuard. Anonymous Grafana admin + a default password are for a
# throwaway localhost demo; do not expose these ports publicly.
#
#   Start:  docker compose -f deploy/telemetry/docker-compose.yml up
#   Prometheus → http://localhost:9090   Grafana → http://localhost:3000
#
# Prometheus reads ./prometheus.yml (active target host.docker.internal:8010).
# `extra_hosts` maps that name to the host gateway so it also works on Linux, where
# Docker does not provide host.docker.internal automatically.

name: pipeguard-telemetry

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: pipeguard-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: pipeguard-grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_SECURITY_ADMIN_PASSWORD: "${GF_ADMIN_PASSWORD:-admin}"
    volumes:
      - ./grafana-datasource.yml:/etc/grafana/provisioning/datasources/pipeguard.yml:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
