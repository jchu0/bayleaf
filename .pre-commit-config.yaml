# Hook tiers (ADR-0011):
#   pre-commit -> ruff (lint+format), mypy, secret scan, hygiene
#   pre-push   -> pytest (offline suite)
#   batch/milestone -> full eval + pip-audit (run manually, not a git hook)
#
# Lint/type/test run in the project's uv environment for exact parity with a
# local `uv run`, so a hook can never pass on a stale interpreter.
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^docs/design/frontend/PipeGuard\.html$ # generated minified bundle
      - id: end-of-file-fixer
        exclude: ^docs/design/frontend/PipeGuard\.html$ # generated minified bundle
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"] # block raw reads / large artifacts (data-handling rule 1)
      - id: detect-private-key

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff (lint)
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        pass_filenames: false
      - id: ruff-format
        name: ruff (format)
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        pass_filenames: false
      - id: mypy
        name: mypy (strict)
        entry: uv run mypy
        language: system
        types_or: [python, pyi]
        pass_filenames: false
      - id: pytest
        name: pytest (offline suite)
        entry: uv run pytest -q
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
      # Frontend type-check on push (same heavy-check-on-push cadence as pytest).
      # The root tsconfig is references-only, so a bare `tsc --noEmit` is a no-op;
      # `tsc -b` in frontend/ builds the referenced projects and is the only way a
      # type error gets caught before it reaches main. Runs the workspace-local tsc.
      - id: frontend-tsc
        name: frontend tsc -b (type-check)
        entry: bash -c 'cd frontend && npx tsc -b'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
      # Soft, non-blocking doc-discipline nudge: warns once/day if code ships without a
      # journal entry. A tripwire, not a gate (the session-end checklist is the enforcer).
      - id: journal-freshness
        name: journal-freshness (warn only, non-blocking)
        entry: uv run python scripts/check_journal_freshness.py
        language: system
        pass_filenames: false
        always_run: true
        verbose: true
        stages: [pre-push]
