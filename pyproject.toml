[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "pipeguard"
version = "0.1.0"
description = "AI-assisted provenance and QC decision gate for genomics runs"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.6",
    "pandas>=2.1",
]

[project.optional-dependencies]
app = ["streamlit>=1.31"]
claude = ["anthropic>=0.40", "python-dotenv>=1.0"]
dev = ["pytest>=8.0"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
