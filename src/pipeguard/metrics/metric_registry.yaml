# PipeGuard metric registry — the canonical metric vocabulary (docs/data/metric_registry.md).
#
# WHY this file exists: it is the stable layer *above* drifting MultiQC/tool keys. A
# `MetricValue` records an observed number; this registry defines what that number
# *means* (its canonical unit, direction, and source contract). `aliases[]` shields a
# gate from MultiQC key renames — a key change maps back to the same `our_key` instead
# of silently dropping a metric.
#
# WHY it lives in-package (src/pipeguard/metrics/): it ships inside the wheel so
# `importlib.resources` loads it in a non-editable install — the same pattern as the
# triage knowledge corpus (pyproject `[tool.setuptools.package-data]`).
#
# Seeded from the "Seed registry" table in docs/data/metric_registry.md. ON the QC critical
# path (T-025): the rules normalize each parsed metric through this registry and gate on the
# canonical value; the runbook thresholds key on these `our_key`s. `metric_registry_version`
# bumps deliberately and is pinned on every AnalysisRun.
#
# NOTE on units and the MultiQC pct trap (metric_registry.md rule 3): a `pct_*`-named
# key does NOT tell you the scale. fastp/Picard raw fields are fractions (0-1) while the
# same logical metric arriving via MultiQC general-stats is a percent (0-100). So each
# entry declares `raw_units_allowed` and normalization keys on the *caller-supplied*
# raw_unit, never on the field name. `qc.breadth_20x` below is the canonical example:
# Picard `PCT_TARGET_BASES_20X` is a fraction, mosdepth-via-MultiQC `20_x_pc` is a percent.
#
# PARSE STATUS (audit P3-10 — registry honesty). A `parser:` value names the DESIGNED parser for
# an entry; it does NOT assert a value is actually computed today. 13 keys are wired end-to-end via
# the flat-CSV path (mapping.py `_QCMETRICS_MAP`); `contamination.freemix` is computed via the WS-03
# ingest adapter's `_extract_verifybamid` (nfcore.py) — a real, present-value parser, gated by an
# optional (verifybamid2-not-in-base-profile) runbook threshold (WS-02). The remaining 6 keys are
# REGISTERED-ONLY / NOT COMPUTED (no parser wired) — each flagged inline below with a
# `# NOT COMPUTED (audit P3-10)` comment: qc.zero_cov_targets, qc.fold_enrichment, qc.fold_80,
# identity.ngscheckmate_match, identity.sex_concordance, variant.allele_balance. The variant GATE is
# DP-only (only `variant.dp` is a threshold; `variant.gq`/`variant.titv` are ungated observations;
# allele-balance/AF are not computed). See docs/data/metric_registry.md "Wiring status".

metric_registry_version: 1

metrics:
  preflight.phix_aligned:
    display_name: PhiX aligned
    gate: preflight
    category: run_qc
    canonical_unit: percent
    value_type: float
    direction: higher_is_better
    source:
      module: sav_interop
      source_file: InterOp
      raw_field: PhiX Aligned
    raw_units_allowed: [percent]
    parser: sav_interop
    parser_version: null
    aliases: [phix_aligned]

  qc.q30:
    display_name: Q30 (post-filter)
    gate: qc
    category: base_quality
    canonical_unit: fraction
    value_type: float
    direction: higher_is_better
    source:
      module: fastp
      source_file: fastp.json
      json_path: summary.after_filtering.q30_rate
      raw_field: after_filtering_q30_rate
    raw_units_allowed: [fraction, percent]
    parser: fastp_json
    parser_version: null
    aliases: [q30_rate, percent_q30]

  qc.reads_passing_filter:
    display_name: Reads passing filter
    gate: qc
    category: yield
    canonical_unit: fraction
    value_type: float
    direction: higher_is_better
    source:
      module: fastp
      source_file: fastp.json
      raw_field: pct_surviving
    raw_units_allowed: [fraction, percent]
    parser: fastp_json
    parser_version: null
    aliases: [filtering_result_passed_filter_reads]

  # STRUCTURAL HOLD (audit P3-1): a run-level SAV/InterOp metric a reads-only fastq→BAM path can't
  # produce, so it typically arrives absent → its required=True runbook threshold NA-flags → an
  # expected HOLD on every reads-based run (the pinned demo relies on HG002 → HOLD). SAV source deferred.
  qc.cluster_pf:
    display_name: Cluster PF
    gate: qc
    category: yield
    canonical_unit: fraction
    value_type: float
    direction: higher_is_better
    source:
      module: sav_interop
      source_file: InterOp
      raw_field: Cluster PF
    raw_units_allowed: [fraction, percent]
    parser: sav_interop
    parser_version: null
    aliases: [cluster_pf, pct_pf_clusters]

  qc.duplication:
    display_name: Duplication rate
    gate: qc
    category: duplication
    canonical_unit: fraction
    value_type: float
    direction: lower_is_better
    source:
      module: fastp
      source_file: fastp.json
      json_path: duplication.rate
      raw_field: duplication_rate
    # AS-BUILT SOURCE (audit P3-10): the live driver (scripts/run_giab_pipeline.py::parse_fastp)
    # reads the duplication rate from fastp.json (`duplication.rate`, a 0-1 fraction it scales to a
    # percent), NOT from Picard MarkDuplicates. The reference germline pipeline dedups with
    # `samtools markdup`, whose metrics file is not the gated source. Picard PERCENT_DUPLICATION
    # (a 0-1 fraction despite the name) and the MultiQC-surfaced pct_duplication /
    # percent_duplicates keys stay supported alternates via `aliases`; raw_units_allowed keeps
    # both fraction and percent (the pct trap).
    raw_units_allowed: [fraction, percent]
    parser: fastp_json
    parser_version: null
    aliases: [pct_duplication, percent_duplicates]

  qc.pct_mapped:
    display_name: Mapped reads
    gate: qc
    category: alignment
    canonical_unit: fraction
    value_type: float
    direction: higher_is_better
    source:
      module: samtools
      source_file: samtools_flagstat
      raw_field: mapped_passed_pct
    raw_units_allowed: [fraction, percent]
    parser: samtools_flagstat
    parser_version: null
    aliases: [reads_mapped_percent]

  qc.on_target:
    display_name: On-target rate
    gate: qc
    category: enrichment
    canonical_unit: fraction
    value_type: float
    direction: higher_is_better
    source:
      module: picard_collecthsmetrics
      source_file: hs_metrics
      raw_field: PCT_SELECTED_BASES
    raw_units_allowed: [fraction, percent]
    parser: picard_hsmetrics
    parser_version: null
    aliases: [pct_selected_bases]

  qc.mean_target_coverage:
    display_name: Mean target coverage
    gate: qc
    category: coverage
    canonical_unit: x
    value_type: float
    direction: higher_is_better
    # Source honesty (WS-06 §9b): the committed germline pipeline computes mean coverage with
    # mosdepth (`--by` panel windows over the dedup BAM → the `total_region` mean row of
    # mosdepth.summary.txt; scripts/run_giab_pipeline.py parse_mosdepth). It never runs Picard
    # CollectHsMetrics, so the source must name mosdepth, not borrow a Picard metric it doesn't emit.
    source:
      module: mosdepth
      source_file: mosdepth.summary.txt
      raw_field: total_region.mean
    raw_units_allowed: [x]
    parser: picard_hsmetrics
    parser_version: null
    aliases: [mean_coverage]

  qc.breadth_20x:
    display_name: Breadth of coverage (>= 20x)
    gate: qc
    category: coverage
    canonical_unit: fraction
    value_type: float
    direction: higher_is_better
    # Source honesty (WS-06 §9b): the driver computes breadth from mosdepth's `--thresholds` output
    # (parse_mosdepth: bases >=20x / region bases), never Picard PCT_TARGET_BASES_20X.
    source:
      module: mosdepth
      source_file: mosdepth.thresholds.bed.gz
      raw_field: ge_20x_bases/region_bases
    # The canonical pct trap: mosdepth's threshold ratio is a fraction, but the same metric via
    # MultiQC mosdepth (`20_x_pc`) is a percent — hence both units allowed.
    raw_units_allowed: [fraction, percent]
    parser: mosdepth_thresholds
    parser_version: null
    aliases: [20_x_pc]

  qc.breadth_30x:
    display_name: Breadth of coverage (>= 30x)
    gate: qc
    category: coverage
    canonical_unit: fraction
    value_type: float
    direction: higher_is_better
    # Source honesty (WS-06 §9b): mosdepth `--thresholds` (bases >=30x / region bases), not Picard.
    source:
      module: mosdepth
      source_file: mosdepth.thresholds.bed.gz
      raw_field: ge_30x_bases/region_bases
    raw_units_allowed: [fraction, percent]
    parser: mosdepth_thresholds
    parser_version: null
    aliases: [30_x_pc]

  # NOT COMPUTED (audit P3-10): registered-only — no parser wired; `parser` names the designed source.
  qc.zero_cov_targets:
    display_name: Zero-coverage targets
    gate: qc
    category: coverage
    canonical_unit: fraction
    value_type: float
    direction: lower_is_better
    source:
      module: picard_collecthsmetrics
      source_file: hs_metrics
      raw_field: ZERO_CVG_TARGETS_PCT
    raw_units_allowed: [fraction, percent]
    parser: picard_hsmetrics
    parser_version: null
    aliases: [zero_cvg_targets_pct]

  # NOT COMPUTED (audit P3-10): registered-only — no parser wired; `parser` names the designed source.
  qc.fold_enrichment:
    display_name: Fold enrichment
    gate: qc
    category: enrichment
    canonical_unit: ratio
    value_type: float
    direction: target_band
    source:
      module: picard_collecthsmetrics
      source_file: hs_metrics
      raw_field: FOLD_ENRICHMENT
    raw_units_allowed: [ratio]
    parser: picard_hsmetrics
    parser_version: null
    aliases: [fold_enrichment]

  # NOT COMPUTED (audit P3-10): registered-only — no parser wired; `parser` names the designed source.
  qc.fold_80:
    display_name: Fold-80 base penalty
    gate: qc
    category: uniformity
    canonical_unit: ratio
    value_type: float
    direction: lower_is_better
    source:
      module: picard_collecthsmetrics
      source_file: hs_metrics
      raw_field: FOLD_80_BASE_PENALTY
    raw_units_allowed: [ratio]
    parser: picard_hsmetrics
    parser_version: null
    aliases: [fold_80_base_penalty]

  # NOT COMPUTED (audit P3-10): registered-only — no parser wired; `parser` names the designed source.
  identity.ngscheckmate_match:
    display_name: NGSCheckMate identity match
    gate: qc
    category: identity
    canonical_unit: bool
    value_type: bool
    direction: higher_is_better
    source:
      module: ngscheckmate
      source_file: ngscheckmate_matched.txt
      raw_field: matched
    raw_units_allowed: [bool]
    parser: ngscheckmate
    parser_version: null
    aliases: [ngscheckmate_matched]

  # NOT COMPUTED (audit P3-10): registered-only — no parser wired; `parser` names the designed source.
  identity.sex_concordance:
    display_name: Sex concordance
    gate: qc
    category: identity
    canonical_unit: bool
    value_type: bool
    direction: higher_is_better
    source:
      module: mosdepth
      source_file: mosdepth_summary
      raw_field: sex_concordant
    raw_units_allowed: [bool]
    parser: sex_check
    parser_version: null
    aliases: [sex_concordant]

  # COMPUTED (WS-02): wired via the WS-03 ingest adapter (`ingest.nfcore._extract_verifybamid`
  # parses the `.selfSM` FREEMIX column) and gated by an OPTIONAL runbook threshold — verifybamid2
  # is not in the germline base profile, so an absent value is never NA-flagged (required=False).
  contamination.freemix:
    display_name: Contamination (FREEMIX)
    gate: qc
    category: contamination
    canonical_unit: fraction
    value_type: float
    direction: lower_is_better
    # Optional / non-base-profile: verifybamid2 is not in the germline default profile. The LIVE run
    # additionally needs an SVD/UD ancestry resource panel (a labelled pipeline input, never fabricated).
    source:
      module: verifybamid2
      source_file: selfSM
      raw_field: FREEMIX
    raw_units_allowed: [fraction]
    parser: verifybamid2
    parser_version: null
    aliases: [freemix]

  # COMPUTED (WS-04): GIAB truth concordance from hap.py, wired via the WS-03 ingest adapter
  # (`ingest.nfcore._extract_happy` reads the SNP + PASS row's METRIC.F1_Score from summary.csv) and
  # gated by an OPTIONAL runbook threshold — a FLOOR (higher is better). hap.py needs a GIAB truth
  # VCF + a high-confidence BED (LABELLED pipeline inputs, NEVER fabricated — ADR-0004: never invent
  # truth), so it is not in the base profile: an absent value is never NA-flagged (required=False).
  concordance.snp_f1:
    display_name: SNP F1 (GIAB concordance)
    gate: qc
    category: concordance
    canonical_unit: fraction
    value_type: float
    direction: higher_is_better
    source:
      module: happy
      source_file: summary.csv
      raw_field: METRIC.F1_Score
    raw_units_allowed: [fraction]
    parser: happy_summary
    parser_version: null
    aliases: [snp_f1]

  # VARIANT GATE IS DP-ONLY (audit P3-10): only `variant.dp` below is a runbook threshold. `variant.gq`
  # and `variant.titv` are registered + wired but UNGATED observations; `variant.allele_balance` is
  # not computed (above). A genotype-depth gate, not a full variant-quality gate.
  variant.dp:
    display_name: Genotype depth (DP)
    gate: variant
    category: depth
    canonical_unit: x
    value_type: int
    direction: higher_is_better
    source:
      module: vcf
      source_file: vcf
      raw_field: FORMAT/DP
    raw_units_allowed: [x]
    parser: vcf_format
    parser_version: null
    aliases: [dp]

  variant.gq:
    display_name: Genotype quality (GQ)
    gate: variant
    category: genotype_quality
    canonical_unit: phred
    value_type: int
    direction: higher_is_better
    source:
      module: vcf
      source_file: vcf
      raw_field: FORMAT/GQ
    raw_units_allowed: [phred]
    parser: vcf_format
    parser_version: null
    aliases: [gq]

  # NOT COMPUTED (audit P3-10): registered-only — no parser wired; `parser` names the designed source.
  variant.allele_balance:
    display_name: Allele balance
    gate: variant
    category: genotype_quality
    canonical_unit: fraction
    value_type: float
    direction: target_band
    source:
      module: vcf
      source_file: vcf
      raw_field: FORMAT/AD
    raw_units_allowed: [fraction]
    parser: vcf_allele_balance
    parser_version: null
    aliases: [ab, allele_balance]

  variant.titv:
    display_name: Ts/Tv ratio
    gate: variant
    category: sanity
    canonical_unit: ratio
    value_type: float
    direction: target_band
    source:
      module: bcftools
      source_file: bcftools_stats
      raw_field: ts/tv
    raw_units_allowed: [ratio]
    parser: bcftools_stats
    parser_version: null
    aliases: [ts_tv, titv]
